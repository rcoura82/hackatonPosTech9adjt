spring:
  application:
    name: rnds-ressarcimento
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rnds_ressarcimento}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:240}

blockchain:
  permissioned:
    enabled: ${BLOCKCHAIN_PERMISSIONED_ENABLED:false}
    endpoint: ${BLOCKCHAIN_PERMISSIONED_ENDPOINT:http://localhost:8081/api/v1/ledger/events}
    api-key: ${BLOCKCHAIN_PERMISSIONED_API_KEY:dev-key}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
